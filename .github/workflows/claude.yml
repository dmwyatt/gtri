name: Claude

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    if: |
      github.actor == 'dmwyatt' && (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
        (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Run Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          use_commit_signing: "true"
          additional_permissions: |
            actions: read
          system_prompt: |
            When working on GitHub issues:
            - When you start implementing a feature or fix, update the issue to `status: in progress`
            - When you open a PR for an issue, update the issue to `status: code review`
            - When setting a new status label, remove only the other `status: *` labels (not type/prio/size labels)

            Example: gh issue edit <number> --remove-label "status: ready" --remove-label "status: triage" --remove-label "status: in progress" --remove-label "status: code review" --add-label "status: <new>"
          claude_args: '--allowedTools "Bash(uv:*)" "Bash(gh issue:*)" "Bash(gh pr:*)" "Bash(gh api:*)"'
